version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mandal-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mandal
    ports:
      - "5610:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: mandal-server
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/mandal?schema=public"
      FRONTEND_URL: "http://localhost:5173"
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - db
    command: ["sh", "-c", "npx prisma db push --accept-data-loss && npm run dev"]

volumes:
  postgres_data:
